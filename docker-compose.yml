services:
  api:
    #имя сервиса; если бы добавляли БД - тут была бы вторая запись db:
    build: . #собирать из dockerfile в текущей папке
    image: task-api:latest #имя собранного образа; latest - стандартный тег "самое новое"
    container_name: task-api #фиксированное имя контейнера чтобы удобно было адресовать в docker logs/stop
    ports:
      - "8000:8000" #слева - порт ноутбука, справа - порт внутри контейнера. Кавычки обязательны
    environment:
      #переменные окружения для приложения внутри контейнера
      LOG_LEVEL: ${LOG_LEVEL:-INFO} #значение из окружения хоста, по умолчанию INFO
      DEBUG: ${DEBUG:-false}
    restart: unless-stopped #если контейнер упал - Docker сам перезапустит его (но не если я остановлю его руками)
